<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowFeed</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
<div id="authPage" class="auth-page">
    <section class="brand-panel">
        <div class="brand-mark">FlowFeed</div>
        <div>
            <h1>Connect with your circle.</h1>
            <p>Share quick thoughts, follow fresh updates, and keep your feed focused on people you care about.</p>
        </div>
    </section>

    <main class="auth-panel">
        <div class="auth-header">
            <div>
                <p class="eyebrow">Welcome</p>
                <h2 id="authTitle">Sign in to FlowFeed</h2>
            </div>
            <div class="tab-switcher" aria-label="Authentication options">
                <button class="tab-button active" data-tab="login" type="button">Login</button>
                <button class="tab-button" data-tab="register" type="button">Register</button>
            </div>
        </div>

        <form id="loginForm" class="auth-form">
            <label>
                <span>Email</span>
                <input name="email" type="email" placeholder="you@example.com" autocomplete="email" required>
            </label>
            <label>
                <span>Password</span>
                <input name="password" type="password" placeholder="Enter your password" autocomplete="current-password" required>
            </label>
            <button type="submit" class="primary-button">Login</button>
        </form>

        <form id="registerForm" class="auth-form hidden">
            <label>
                <span>Username</span>
                <input name="username" type="text" placeholder="Choose a username" autocomplete="username" required>
            </label>
            <label>
                <span>Email</span>
                <input name="email" type="email" placeholder="you@example.com" autocomplete="email" required>
            </label>
            <label>
                <span>Password</span>
                <input name="password" type="password" placeholder="At least 6 characters" autocomplete="new-password" required>
            </label>
            <button type="submit" class="primary-button">Create account</button>
        </form>

        <div id="authMessage" class="message" aria-live="polite"></div>
    </main>
</div>

<div id="homePage" class="home-page hidden">
    <header class="topbar">
        <div class="topbar-brand">
            <span class="brand-dot"></span>
            <strong>FlowFeed</strong>
        </div>
        <button id="logoutButton" class="ghost-button" type="button">Logout</button>
    </header>

    <main class="home-layout">
        <aside class="profile-panel">
            <div class="profile-card">
                <div class="avatar" id="profileAvatar">F</div>
                <h2 id="profileUsername">FlowFeed User</h2>
                <p id="profileEmail">user@example.com</p>
                <p id="profileBio" class="profile-bio">No bio yet.</p>
            </div>
        </aside>

        <section class="feed-panel">
            <form id="postForm" class="composer">
                <label for="captionInput">What would you like to share?</label>
                <textarea id="captionInput" name="caption" rows="4" maxlength="1000"
                          placeholder="Write a post..."></textarea>
                <div class="composer-actions">
                    <span id="characterCount">0/1000</span>
                    <button type="submit" class="primary-button">Post</button>
                </div>
            </form>

            <div class="feed-header">
                <div>
                    <p class="eyebrow">Timeline</p>
                    <h1>Latest posts</h1>
                </div>
                <button id="refreshPostsButton" class="ghost-button" type="button">Refresh</button>
            </div>

            <div id="appMessage" class="message" aria-live="polite"></div>
            <div id="postsContainer" class="posts-list"></div>
        </section>
    </main>
</div>

<script src="./app.js"></script>
</body>
</html>
